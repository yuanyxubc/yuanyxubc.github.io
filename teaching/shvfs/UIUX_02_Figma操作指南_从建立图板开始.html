<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figma 操作指南 · 从建立图板开始</title>
<style>
:root{
  --bg:#f6f7fb; --card:#ffffff; --ink:#1f2430; --dim:#6b7280; --line:#e6e8f0;
  --accent:#4f46e5; --accent-soft:#eef1ff; --good:#16a34a; --good-soft:#eafaf0;
  --warn:#b45309; --warn-soft:#fff4e5; --radius:10px;
  --shadow:0 1px 2px rgba(20,20,50,.04), 0 6px 16px rgba(20,20,50,.05);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg); color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Roboto,Helvetica,Arial,sans-serif;
  font-size:15px; line-height:1.75;
}
a{color:var(--accent)}

#layout{display:flex; max-width:1280px; margin:0 auto; align-items:flex-start}
#toc{position:sticky; top:0; height:100vh; width:250px; flex:0 0 250px; padding:28px 14px 28px 20px; overflow-y:auto}
#toc h1{font-size:16px; margin:0 0 4px}
#toc .sub{font-size:12px; color:var(--dim); margin-bottom:20px}
#toc nav a{display:block; padding:7px 10px; margin-bottom:2px; border-radius:8px; font-size:12.5px; color:var(--dim);
  text-decoration:none; border-left:3px solid transparent}
#toc nav a:hover{background:var(--accent-soft); color:var(--accent)}
#toc nav a.active{background:var(--accent-soft); color:var(--accent); border-left-color:var(--accent); font-weight:600}
#toc .savehint{margin-top:18px; font-size:11px; color:var(--dim)}

main{flex:1; min-width:0; padding:28px 32px 120px}
.intro{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow);
  padding:22px 26px; margin-bottom:22px}
.intro h1{font-size:21px; margin:0 0 10px}
.intro p{margin:0 0 8px}
.intro p:last-child{margin-bottom:0}

.phase{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow);
  padding:22px 26px; margin-bottom:18px; scroll-margin-top:16px}
.phase-head{display:flex; align-items:flex-start; gap:12px; margin-bottom:6px}
.phase-num{flex:0 0 auto; font-size:12px; font-weight:700; color:#fff; background:var(--accent);
  border-radius:7px; padding:5px 10px; margin-top:2px}
.phase-titles h2{font-size:18px; margin:0}
.phase-titles .ref{font-size:11.5px; color:var(--dim); margin-top:2px}
.goal{display:flex; gap:10px; align-items:flex-start; background:var(--accent-soft); border-radius:8px;
  padding:10px 14px; margin:12px 0 14px; font-size:14px}
.goal .lab{flex:0 0 auto; font-size:10.5px; font-weight:700; color:var(--accent); padding-top:2px}

.steps{display:flex; flex-direction:column; gap:2px}
.step{display:flex; gap:12px; align-items:flex-start; padding:9px 6px; border-radius:7px}
.step:hover{background:#fafafe}
.step .n{flex:0 0 auto; width:24px; height:24px; border-radius:50%; background:var(--good-soft); color:var(--good);
  font-size:12px; font-weight:700; display:flex; align-items:center; justify-content:center; margin-top:1px}
.step .txt{font-size:14.5px; line-height:1.65}
kbd{font-family:"SFMono-Regular",Consolas,monospace; font-size:12px; background:#eef0f5; border:1px solid var(--line);
  border-radius:4px; padding:1px 6px; color:var(--ink)}
.ui{font-weight:600; color:var(--ink)}

.tip{background:var(--good-soft); border-left:4px solid var(--good); border-radius:0 8px 8px 0; padding:10px 16px;
  font-size:13.5px; margin-top:12px}
.tip b{color:var(--good)}
.warn{background:var(--warn-soft); border-left:4px solid var(--warn); border-radius:0 8px 8px 0; padding:10px 16px;
  font-size:13.5px; margin-top:12px}
.warn b{color:var(--warn)}

#toolbar{position:fixed; right:18px; bottom:18px; z-index:50; display:flex; gap:8px}
#toolbar button{font-size:13px; padding:10px 14px; border-radius:9px; border:1px solid var(--line);
  background:#fff; color:var(--ink); cursor:pointer; box-shadow:var(--shadow)}
#toolbar button:hover{border-color:var(--accent); color:var(--accent)}
#toolbar button.on{background:var(--accent); color:#fff; border-color:var(--accent)}
#toolbar #btnExport{background:var(--ink); color:#fff; border-color:var(--ink)}
#hint{position:fixed; left:18px; bottom:18px; z-index:50; font-size:12.5px; color:var(--dim);
  background:#fff; border:1px solid var(--line); border-radius:8px; padding:8px 12px; box-shadow:var(--shadow); max-width:340px}
[data-t]{border-radius:5px; padding:1px 3px; margin:-1px -3px}
.editing [data-t]{outline:1px dashed #c7ccdb; cursor:text}
.editing [data-t]:hover{outline-color:var(--accent)}
.editing [data-t]:focus{outline:2px solid var(--accent); background:var(--accent-soft)}

@media (max-width:920px){ #toc{display:none} main{padding:20px 16px 120px} }
</style>
</head>

  <aside id="toc">
    <h1>Figma 操作指南</h1>
    <div class="sub">从建立图板开始 · 一步一步照做</div>
    <nav id="tocnav"></nav>

/* ============================================================
   Render (same edit/export architecture as the other reference docs)
   ============================================================ */
const PRISTINE = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
const STORE_KEY = "uiux02_figma_howto_v1";
let EDITS={}, editMode=false, _saveT;

function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
// PHASES text may contain pre-authored <span class="ui">/<kbd> tags (trusted, hand-written content,
// not user input) — escape everything else, then unescape just those two whitelisted tags.
function richText(s){
  return esc(s)
    .replace(/&lt;span class=&quot;ui&quot;&gt;/g,'<span class="ui">')
    .replace(/&lt;\/span&gt;/g,'</span>')
    .replace(/&lt;kbd&gt;/g,'<kbd>')
    .replace(/&lt;\/kbd&gt;/g,'</kbd>');
}

function loadSaved(){
  try{ const ls=JSON.parse(localStorage.getItem(STORE_KEY)); if(ls&&ls.edits) return ls.edits; }catch(e){}
  const emb=document.getElementById("embedded-data");
  if(emb && emb.textContent.trim()){
    try{ const o=JSON.parse(emb.textContent); if(o&&o.edits){ saveRaw(o.edits); return o.edits; } }catch(e){}
  }
  return {};
}
function saveRaw(edits){ try{ localStorage.setItem(STORE_KEY, JSON.stringify({edits,_savedAt:Date.now()})); return true; }catch(e){ return false; } }
function persist(){
  clearTimeout(_saveT);
  _saveT=setTimeout(()=>{
    const ok=saveRaw(EDITS);
    document.getElementById("saveHint").textContent = ok ? ("已自动保存 · "+new Date().toLocaleTimeString()) : "⚠ 本地存储已满，请点导出";
  },300);
}
function keyOf(t,r,i){ return t+":"+r+(i==null?"":":"+i); }
function getVal(t,r,i,fallback){ const k=keyOf(t,r,i); return (k in EDITS) ? EDITS[k] : fallback; }
function setVal(t,r,i,v){ EDITS[keyOf(t,r,i)]=v; persist(); }

const main=document.getElementById("main");
const tocnav=document.getElementById("tocnav");

function render(){
  main.innerHTML = `
    <div class="intro">
      <h1>Figma 操作指南 · 从建立图板开始</h1>
      <p>这份是手怎么动的具体步骤，从新建文件、建 Page，一路到导出设置，每一条都是可以照着点的操作。</p>
      <p>跟《Figma 生产流程·目标与检查清单》是配套关系——那份让你们自己填时间、目标、检查项，这份负责告诉你们每一步具体怎么操作。</p>
      <p><b>为什么要花时间把即刻设计的东西迁移到 Figma，值得先说清楚：</b>Figma 是目前游戏和产品 UI/UX 行业里事实上的通用工具，绝大多数公司的招聘信息会直接写"熟练使用 Figma"，面试里现场做设计题、review 作品集，用的也基本是 Figma。申请设计相关的研究生项目或作品集评审时，能不能拿出一个可以在线打开、可以点击交互的 Figma 原型，而不是几张静态截图，也是很实际的加分项。更重要的是，这门课要求你们做的这些事——统一命名、Design Tokens、组件做成 Variants、标 Constraints、Dev Mode 交接——不是这门课自己发明的规矩，是真实设计团队维护一套可复用系统时通用的做法，练的是能直接带到实习和工作里的手法，不是只在课堂上用一次就丢掉的格式要求。</p>
    </div>
  ` + PHASES.map((p,pi)=>{
    const stepsHTML = p.steps.map((s,si)=>`
      <div class="step"><div class="n">${si+1}</div><div class="txt" data-t="step" data-r="${pi}" data-i="${si}">${richText(getVal("step",pi,si,s))}</div></div>`).join("");
    const tipHTML = p.tip ? `<div class="tip" data-t="tip" data-r="${pi}"><b>提示</b>：${richText(getVal("tip",pi,null,p.tip))}</div>` : "";
    const warnHTML = p.warn ? `<div class="warn" data-t="warn" data-r="${pi}"><b>注意</b>：${richText(getVal("warn",pi,null,p.warn))}</div>` : "";
    return `<section class="phase" id="phase-${pi}">
      <div class="phase-head">
        <div class="phase-num">${pi+1}</div>
        <div class="phase-titles">
          <h2 data-t="title" data-r="${pi}">${esc(getVal("title",pi,null,p.title))}</h2>
          <div class="ref">${esc(p.ref)}</div>
        </div>
      </div>
      <div class="goal"><span class="lab">目标</span><span data-t="goal" data-r="${pi}">${richText(getVal("goal",pi,null,p.goal))}</span></div>
      <div class="steps">${stepsHTML}</div>
      ${tipHTML}${warnHTML}
    </section>`;
  }).join("");
  renderTOC();
  applyEditMode();
}

function renderTOC(){
  tocnav.innerHTML = PHASES.map((p,pi)=>`<a href="#phase-${pi}" data-i="${pi}">${pi+1}. ${esc(p.title)}</a>`).join("");
  tocnav.querySelectorAll("a").forEach(a=>{
    a.addEventListener("click",e=>{ e.preventDefault(); document.getElementById("phase-"+a.dataset.i).scrollIntoView({behavior:"smooth",block:"start"}); });
  });
}
function wireScrollSpy(){
  const links=[...tocnav.querySelectorAll("a")];
  const io=new IntersectionObserver(entries=>{
    entries.forEach(en=>{ if(en.isIntersecting) links.forEach(a=>a.classList.toggle("active", "phase-"+a.dataset.i===en.target.id)); });
  },{rootMargin:"-15% 0px -70% 0px"});
  document.querySelectorAll(".phase").forEach(sec=>io.observe(sec));
}

function applyEditMode(){
  document.querySelectorAll("[data-t]").forEach(el=>{
    if(editMode) el.setAttribute("contenteditable","true"); else el.removeAttribute("contenteditable");
  });
}
function toggleEdit(){
  editMode=!editMode;
  document.body.classList.toggle("editing",editMode);
  applyEditMode();
  document.getElementById("btnEdit").textContent = editMode ? "✓ 完成编辑" : "✎ 编辑";
  document.getElementById("btnEdit").classList.toggle("on",editMode);
  document.getElementById("btnReset").style.display = editMode ? "" : "none";
}
main.addEventListener("input", e=>{
  const el=e.target.closest("[data-t]");
  if(!el || !editMode) return;
  setVal(el.dataset.t, +el.dataset.r, el.dataset.i!=null && el.dataset.i!=="" ? +el.dataset.i : null, el.innerText);
});

function download(name, content, mime){
  const blob=new Blob([content],{type:mime||"text/html;charset=utf-8"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob); a.download=name;
  document.body.appendChild(a); a.click();
  let done=false;
  const cleanup=()=>{ if(done)return; done=true; URL.revokeObjectURL(a.href); a.remove(); window.removeEventListener("focus",onFocus); };
  const onFocus=()=>setTimeout(cleanup,3000);
  window.addEventListener("focus",onFocus);
  setTimeout(cleanup,60000);
}
function replaceEmbeddedDataTag(html, jsonPayload){
  const openNeedle = '<script id="embedded-data"';
  const closeNeedle = "<" + "/script>";
  const openIdx = html.indexOf(openNeedle);
  if(openIdx<0) return html;
  const gtIdx = html.indexOf(">", openIdx);
  const closeIdx = html.indexOf(closeNeedle, gtIdx);
  if(gtIdx<0 || closeIdx<0) return html;
  return html.slice(0, gtIdx+1) + jsonPayload + html.slice(closeIdx);
}
function exportHTML(){
  try{
    const payload=JSON.stringify({edits:EDITS}).replace(/<\/script/gi,"<\\/script");
    const html = replaceEmbeddedDataTag(PRISTINE, payload);
    download("UIUX_02_Figma操作指南_已编辑.html", html);
  }catch(err){ alert("导出失败："+(err&&err.message||err)); }
}
function resetAll(){
  if(!confirm("重置所有修改？（已导出的文件不受影响）")) return;
  EDITS={};
  try{ localStorage.removeItem(STORE_KEY); }catch(e){}
  render(); wireScrollSpy();
  document.getElementById("saveHint").textContent="未修改";
}

function init(){
  EDITS=loadSaved();
  render();
  wireScrollSpy();
  document.getElementById("btnEdit").addEventListener("click", toggleEdit);
  document.getElementById("btnExport").addEventListener("click", exportHTML);
  document.getElementById("btnReset").addEventListener("click", resetAll);
  if(Object.keys(EDITS).length) document.getElementById("saveHint").textContent="已载入此前的修改";
}
init();
</script>
