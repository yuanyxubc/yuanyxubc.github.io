{sec:"ASSIGNMENT",en:"Lesson 04 Deliverables",cn:"ARPG High-fidelity UI System · 个人作业",kind:"bullets",lead:"第四课作业必须建立在第三课结构上。",items:["Visual Direction：关键词、Moodboard 与规则","Design Tokens + Component Library + Variants","5–7 张高保真 UI，覆盖六个规定界面","至少一条可点击任务流 + Wireframe/Hi-fi 对照"]},
{sec:"PROCESS",en:"Preserve Your Process",cn:"作品集需要证明推导与迭代，不只展示结果",kind:"bullets",lead:"妥善保存制作过程的素材或截图。",items:["页面地图与任务流的阶段截图","wireframe 版本与关键修改","Tokens 和组件库建立过程","同伴反馈与修改前后对照","使用的参考来源与取舍说明"]},
{sec:"GRADING",en:"How Lesson 04 Is Graded",cn:"60 分：视觉系统、状态覆盖与高保真落地",kind:"rubric",rows:[["Visual Direction 与世界观一致性","8"],["Design Tokens 完整性与语义化","10"],["Components、Variants 与命名","12"],["高保真页面：可读性、层级与完成度","18"],["跨页面一致性与状态覆盖","7"],["作品集表达与前后对照","5"]]},
{sec:"TIMELINE",en:"Two-Week Production Plan",cn:"先完成系统，再扩展页面，最后整理作品集",kind:"flow",steps:["Day 1–2<br>结构确认","Day 3–5<br>Wireframe","Day 6–8<br>视觉系统","Day 9–12<br>高保真扩展","Day 13–14<br>作品集整理"]},
{sec:"PORTFOLIO",en:"Portfolio Case Map",cn:"让评审看到问题、推导、系统与结果",kind:"flow",steps:["Problem / Research","IA / Task Flow","Wireframes","Tokens / Components","Hi-fi Screens","Test / Iteration"]},
{sec:"NEXT",en:"Exit Ticket · Next: Prototype",cn:"第五课将验证这套设计是否真的能用",kind:"task",icon:"✓",title:"Exit Ticket",text:"提交一张高保真基准页、Token 截图和组件状态截图；写下你最担心的一处跨页面不一致。",time:"2 MIN"}
];

const accents={START:"#45d9ff",RECAP:"#a98bff",GOAL:"#69f087",SURFACE:"#ff6b8b",REVIEW:"#a98bff","ART DIRECTION":"#ffd23f",ACTIVITY:"#69f087",TOKENS:"#45d9ff",ACCESS:"#ff6b8b",COMPONENTS:"#a98bff",FIGMA:"#45d9ff",BREAK:"#ffd23f",DEMO:"#ff6b8b",WORKSHOP:"#69f087",ASSIGNMENT:"#ffd23f",PROCESS:"#45d9ff",GRADING:"#a98bff",TIMELINE:"#69f087",PORTFOLIO:"#ffd23f",NEXT:"#69f087"};
let slides=[],idx=0,editMode=false,uploadTarget=null,saveTimer=null;
const stage=document.getElementById('stage'),progress=document.getElementById('progress'),overview=document.getElementById('overview'),fileInput=document.getElementById('fileInput'),saveState=document.getElementById('saveState');
const storageKey='uiux-l04-deck:'+location.pathname;
function esc(s){return String(s??'').replace(/[&<>\"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[m]))}
function bullets(items){return `<ul>${items.map(x=>`<li class="editable">${x}</li>`).join('')}</ul>`}
function content(s){
 if(s.kind==='flow')return `<div class="flow">${s.steps.map(x=>`<div class="step editable">${x}</div>`).join('')}</div>`;
 if(s.kind==='cards')return `<div class="cards">${s.cards.map(c=>`<div class="card"><span class="num editable">${c[0]}</span><h3 class="editable">${c[1]}</h3><p class="editable">${c[2]}</p></div>`).join('')}</div>`;
 if(s.kind==='split')return `<div class="cols">${s.cols.map(c=>`<div class="col"><h3 class="editable">${c[0]}</h3>${bullets(c[1])}</div>`).join('')}</div>`;
 if(s.kind==='matrix')return `<div class="matrix">${s.cells.map(c=>`<div class="cell"><h3 class="editable">${c[0]}</h3><p class="editable">${c[1]}</p></div>`).join('')}</div>`;
 if(s.kind==='task')return `<div class="taskbox"><div class="taskicon editable">${s.icon}</div><div class="taskcopy"><h3 class="editable">${s.title}</h3><p class="editable">${s.text}</p><span class="time editable">${s.time}</span></div></div>`;
 if(s.kind==='image')return `<div class="media-layout"><div class="media-frame" data-upload><div class="ph"><b>＋ IMAGE / VIDEO</b><span class="editable">${s.image}</span></div></div><div>${bullets(s.items)}</div></div>`;
 if(s.kind==='rubric')return `<div class="rubric">${s.rows.map(r=>`<div class="editable">${r[0]}</div><div class="score editable">${r[1]}</div>`).join('')}</div>`;
 return `<div class="lead editable">${s.lead||''}</div>${s.items?`<div style="height:14px"></div>${bullets(s.items)}`:''}`;
}
function slideHTML(s,i){const accent=accents[s.sec]||'#45d9ff';
 if(s.kind==='cover')return `<section class="slide cover" style="--accent:${accent}"><span class="eyebrow editable">UIUX · PROJECT MODE</span><h1 class="editable">${s.en}</h1><h2 class="editable">${s.cn}</h2><p class="editable">${s.sub}</p><div class="start">▶ PRESS → TO START</div></section>`;
 if(s.kind==='break')return `<section class="slide break" style="--accent:${accent}"><div class="body"><div class="panel"><div class="big">☕</div><h2 class="editable">${s.cn}</h2><p class="editable">${s.sub}</p></div></div></section>`;
 return `<section class="slide" style="--accent:${accent}"><div class="hud"><div class="tag editable">${s.sec}</div><div class="counter">P <b>${String(i+1).padStart(2,'0')}</b> / ${baseSlides.length}</div></div><div class="title"><div class="en editable">${s.en}</div><div class="cn editable">${s.cn}</div></div><div class="rule"></div><div class="body"><div class="panel">${content(s)}</div></div><div class="foot"><div>UIUX-04 · ARPG HIGH-FIDELITY SYSTEM</div><div class="help">← → <b>MOVE</b> · O <b>MENU</b> · E <b>EDIT</b> · F <b>FULL</b></div></div></section>`;
}
function build(){stage.querySelectorAll('.slide').forEach(x=>x.remove());progress.innerHTML='';baseSlides.forEach((s,i)=>{stage.insertAdjacentHTML('beforeend',slideHTML(s,i));progress.insertAdjacentHTML('beforeend','<i></i>')});slides=[...stage.querySelectorAll('.slide')];bindUploads();}
function show(n){idx=Math.max(0,Math.min(slides.length-1,n));slides.forEach((s,i)=>s.classList.toggle('active',i===idx));[...progress.children].forEach((b,i)=>b.classList.toggle('on',i<=idx));}
function fit(){const toolbarSpace=Math.ceil(document.getElementById('toolbar').getBoundingClientRect().bottom+10);document.documentElement.style.setProperty('--toolbar-space',toolbarSpace+'px');stage.style.transform=`translate(-50%,-50%) scale(${Math.min(innerWidth/1280,Math.max(240,innerHeight-toolbarSpace)/720)})`}
function toggleEdit(){editMode=!editMode;stage.classList.toggle('editing',editMode);document.querySelectorAll('.editable').forEach(x=>x.contentEditable=editMode?'true':'false');document.getElementById('editBtn').classList.toggle('on',editMode);document.getElementById('editBtn').textContent=editMode?'✓ 完成':'✎ 编辑';if(!editMode)saveNow()}
function snapshot(){return slides.map(s=>s.innerHTML)}function restore(htmls){if(!Array.isArray(htmls)||htmls.length!==slides.length)return false;slides.forEach((s,i)=>s.innerHTML=htmls[i]);bindUploads();return true}
function saveNow(){try{localStorage.setItem(storageKey,JSON.stringify(snapshot()));saveState.textContent='已保存 '+new Date().toLocaleTimeString('zh-CN',{hour12:false});saveState.style.color='var(--green)'}catch(e){saveState.textContent='保存失败，请导出 HTML';saveState.style.color='var(--red)'}}
function scheduleSave(){saveState.textContent='编辑中…';clearTimeout(saveTimer);saveTimer=setTimeout(saveNow,600)}
function exportHTML(){saveNow();const clone=document.documentElement.cloneNode(true),data=clone.querySelector('#embedded-data');data.textContent=JSON.stringify({slideHtml:snapshot()}).replace(/<\/script/gi,'<\\/script');clone.querySelector('#stage')?.classList.remove('editing');clone.querySelectorAll('[contenteditable]').forEach(x=>x.setAttribute('contenteditable','false'));const blob=new Blob(['<!doctype html>\n'+clone.outerHTML],{type:'text/html;charset=utf-8'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='UIUX_04_高保真视觉系统_像素课件_edited.html';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1500);saveState.textContent='已导出当前 HTML'}
function bindUploads(){document.querySelectorAll('[data-upload]').forEach(f=>{f.onclick=e=>{if(e.target.closest('img,video'))return;uploadTarget=f;fileInput.click()};f.ondragover=e=>e.preventDefault();f.ondrop=e=>{e.preventDefault();uploadTarget=f;readFile(e.dataTransfer.files[0])}})}
function readFile(file){if(!file||!uploadTarget)return;const r=new FileReader();r.onload=()=>{uploadTarget.querySelectorAll('img,video').forEach(x=>x.remove());const el=document.createElement(file.type.startsWith('video')?'video':'img');el.src=r.result;if(el.tagName==='VIDEO')el.controls=true;uploadTarget.appendChild(el);saveNow()};r.readAsDataURL(file)}
function buildOverview(){overview.innerHTML='';baseSlides.forEach((s,i)=>overview.insertAdjacentHTML('beforeend',`<div class="thumb" data-i="${i}"><div class="tn">P${String(i+1).padStart(2,'0')} · ${esc(s.sec)}</div><div class="tt">${esc(s.en)}</div><div class="tc">${esc(s.cn)}</div></div>`));overview.querySelectorAll('.thumb').forEach(t=>t.onclick=()=>{overview.classList.remove('show');show(+t.dataset.i)})}
function toggleOverview(){if(!overview.innerHTML)buildOverview();overview.classList.toggle('show')}
fileInput.onchange=()=>readFile(fileInput.files[0]);stage.addEventListener('input',scheduleSave);
document.getElementById('editBtn').onclick=toggleEdit;document.getElementById('saveBtn').onclick=saveNow;document.getElementById('exportBtn').onclick=exportHTML;document.getElementById('overviewBtn').onclick=toggleOverview;document.getElementById('fullBtn').onclick=()=>document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen();document.getElementById('resetBtn').onclick=()=>{if(confirm('恢复课件初始内容？浏览器内修改将被覆盖。')){localStorage.removeItem(storageKey);build();show(0);saveState.textContent='已恢复初稿'}};
document.addEventListener('keydown',e=>{if(document.activeElement?.isContentEditable){if(e.key==='Escape')document.activeElement.blur();return}if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown'){show(idx+1);e.preventDefault()}else if(e.key==='ArrowLeft'||e.key==='PageUp'){show(idx-1);e.preventDefault()}else if(e.key.toLowerCase()==='o')toggleOverview();else if(e.key.toLowerCase()==='e')toggleEdit();else if(e.key.toLowerCase()==='f')document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen();else if(e.key==='Escape')overview.classList.remove('show')});
build();let restored=false;try{const embedded=JSON.parse(document.getElementById('embedded-data').textContent||'{}');restored=restore(embedded.slideHtml);if(!restored){const local=JSON.parse(localStorage.getItem(storageKey)||'null');restored=restore(local)}}catch(e){}show(0);fit();document.fonts?.ready.then(fit);addEventListener('resize',fit);if(restored)saveState.textContent='已恢复保存内容';
</script>
<script>
(function(){
'use strict';
const originalDeckBuild=build;
let uploadMode='replace',overviewDrag=-1;

function mediaToolsHTML(){
 return '<div class="media-tools"><button data-media="drag" title="拖动图片">↕</button><button data-media="fit" title="切换适应/填充">适应</button><button data-media="replace">替换</button><button data-media="delete">删除</button></div>';
}
function slideNodes(){return [...stage.children].filter(x=>x.classList&&x.classList.contains('slide'))}
function cleanSlideHTML(slide){
 const c=slide.cloneNode(true);c.classList.remove('active');
 c.querySelectorAll('[contenteditable]').forEach(x=>x.removeAttribute('contenteditable'));
 return c.outerHTML;
}
function deckState(){
 return {version:2,index:idx,slides:slides.map(cleanSlideHTML)};
}
function refreshDeck(active){
 slides=slideNodes();
 if(!slides.length){originalDeckBuild();slides=slideNodes()}
 progress.innerHTML=slides.map(()=>'<i></i>').join('');
 slides.forEach((s,i)=>{
  const c=s.querySelector('.counter');
  if(c)c.innerHTML='P <b>'+String(i+1).padStart(2,'0')+'</b> / '+slides.length;
 });
 document.querySelectorAll('.editable').forEach(x=>x.contentEditable=editMode?'true':'false');
 bindUploads();
 if(active&&slides.includes(active))idx=slides.indexOf(active);
 idx=Math.max(0,Math.min(slides.length-1,idx));
 show(idx);
}
function restoreDeck(state){
 if(!state||!Array.isArray(state.slides)||!state.slides.length)return false;
 stage.querySelectorAll('.slide').forEach(x=>x.remove());
 stage.insertAdjacentHTML('beforeend',state.slides.join(''));
 slides=slideNodes();idx=Math.max(0,Math.min(slides.length-1,Number(state.index)||0));
 refreshDeck(slides[idx]);return true;
}
snapshot=function(){return deckState()};
saveNow=function(){
 try{
  localStorage.setItem(storageKey,JSON.stringify(deckState()));
  saveState.textContent='已保存 '+new Date().toLocaleTimeString('zh-CN',{hour12:false});
  saveState.style.color='var(--green)';
 }catch(e){
  saveState.textContent='图片较大，浏览器保存空间不足；请直接导出 HTML';
  saveState.style.color='var(--red)';
 }
};
exportHTML=function(){
 const state=deckState(),clone=document.documentElement.cloneNode(true),data=clone.querySelector('#embedded-data');
 data.textContent=JSON.stringify({deckData:state}).replace(/<\/script/gi,'<\\/script');
 clone.querySelector('#stage')?.classList.remove('editing');
 clone.querySelector('#overview')?.classList.remove('show');
 if(clone.querySelector('#overview'))clone.querySelector('#overview').innerHTML='';
 clone.querySelectorAll('[contenteditable]').forEach(x=>x.removeAttribute('contenteditable'));
 const blob=new Blob(['<!doctype html>\n'+clone.outerHTML],{type:'text/html;charset=utf-8'}),a=document.createElement('a');
 a.href=URL.createObjectURL(blob);
 let name=decodeURIComponent(location.pathname.split('/').pop()||'UIUX_课件.html').replace(/\.html$/i,'').replace(/_edited$/i,'');
 a.download=name+'_edited.html';a.click();
 setTimeout(()=>URL.revokeObjectURL(a.href),1500);
 saveState.textContent='已导出：页面结构与图片均已写入 HTML';
};

function bindMediaBox(box){
 box.onpointerup=()=>{if(editMode)scheduleSave()};
 box.querySelector('[data-media="delete"]').onclick=e=>{e.stopPropagation();box.remove();refreshDeck();saveNow()};
 box.querySelector('[data-media="replace"]').onclick=e=>{e.stopPropagation();uploadMode='replace';uploadTarget=box;fileInput.value='';fileInput.click()};
 box.querySelector('[data-media="fit"]').onclick=e=>{
  e.stopPropagation();const media=box.querySelector('img,video');if(!media)return;
  const cover=media.style.objectFit==='cover';media.style.objectFit=cover?'contain':'cover';
  e.currentTarget.textContent=cover?'适应':'填充';saveNow();
 };
 const handle=box.querySelector('[data-media="drag"]');
 handle.onpointerdown=e=>{
  if(!editMode)return;e.preventDefault();e.stopPropagation();
  const scale=stage.getBoundingClientRect().width/1280||1,sx=e.clientX,sy=e.clientY,sl=box.offsetLeft,st=box.offsetTop;
  handle.setPointerCapture?.(e.pointerId);
  const move=ev=>{
   const left=Math.max(0,Math.min(1280-box.offsetWidth,sl+(ev.clientX-sx)/scale));
   const top=Math.max(0,Math.min(720-box.offsetHeight,st+(ev.clientY-sy)/scale));
   box.style.left=Math.round(left)+'px';box.style.top=Math.round(top)+'px';
  };
  const up=()=>{window.removeEventListener('pointermove',move);window.removeEventListener('pointerup',up);saveNow()};
  window.addEventListener('pointermove',move);window.addEventListener('pointerup',up);
 };
}
bindUploads=function(){
 document.querySelectorAll('[data-upload]').forEach(f=>{
  f.onclick=e=>{if(!editMode)return;e.stopPropagation();uploadMode='replace';uploadTarget=f;fileInput.value='';fileInput.click()};
  f.ondragover=e=>{if(editMode)e.preventDefault()};
  f.ondrop=e=>{if(!editMode)return;e.preventDefault();uploadMode='replace';uploadTarget=f;readFile(e.dataTransfer.files[0])};
 });
 document.querySelectorAll('.slide-media').forEach(bindMediaBox);
};
readFile=function(file){
 if(!file||!uploadTarget)return;
 const target=uploadTarget,mode=uploadMode,r=new FileReader();
 r.onload=()=>{
  let box=target;
  if(mode==='new'){
   const n=slides[idx].querySelectorAll('.slide-media').length;
   box=document.createElement('div');box.className='slide-media';
   box.style.left=(700+(n%5)*24)+'px';box.style.top=(205+(n%5)*24)+'px';
   box.innerHTML=mediaToolsHTML();slides[idx].appendChild(box);
  }
  box.querySelectorAll('img,video').forEach(x=>x.remove());
  const el=document.createElement(file.type.startsWith('video')?'video':'img');
  el.src=r.result;el.alt=file.name||'插入图片';el.style.objectFit='contain';
  if(el.tagName==='VIDEO')el.controls=true;
  box.appendChild(el);if(box.classList.contains('slide-media'))bindMediaBox(box);
  fileInput.value='';uploadTarget=null;uploadMode='replace';saveNow();
 };
 r.readAsDataURL(file);
};

function slideMeta(slide,i){
 const tag=slide.querySelector('.tag')?.textContent.trim()||(slide.classList.contains('cover')?'COVER':slide.classList.contains('break')?'BREAK':'SLIDE');
 const en=slide.querySelector('.en')?.textContent.trim()||slide.querySelector('h1')?.textContent.trim()||'UNTITLED';
 const cn=slide.querySelector('.cn')?.textContent.trim()||slide.querySelector('h2')?.textContent.trim()||'未命名页面';
 return {tag,en,cn,i};
}
function moveSlide(from,to){
 if(from===to||from<0||to<0||from>=slides.length||to>=slides.length)return;
 const active=slides[idx],moving=slides[from],target=slides[to];
 if(from<to)stage.insertBefore(moving,target.nextSibling);
 else stage.insertBefore(moving,target);
 refreshDeck(active);saveNow();buildOverview();
}
function duplicateSlide(i){
 const clone=slides[i].cloneNode(true);clone.classList.remove('active');
 stage.insertBefore(clone,slides[i].nextSibling);refreshDeck(clone);saveNow();buildOverview();
}
function deleteSlide(i){
 if(slides.length===1)return alert('课件至少需要保留一页。');
 if(!confirm('删除第 '+(i+1)+' 页？'))return;
 const active=slides[idx];slides[i].remove();refreshDeck(active===slides[i]?null:active);saveNow();buildOverview();
}
function addBlankSlide(){
 const foot=slides.find(s=>s.querySelector('.foot'))?.querySelector('.foot')?.outerHTML||'';
 const html='<section class="slide" style="--accent:#45d9ff"><div class="hud"><div class="tag editable">NEW</div><div class="counter"></div></div><div class="title"><div class="en editable">NEW SLIDE</div><div class="cn editable">新页面</div></div><div class="rule"></div><div class="body"><div class="panel"><div class="lead editable">在这里输入页面内容。</div></div></div>'+foot+'</section>';
 stage.insertAdjacentHTML('beforeend',html);const added=slideNodes().at(-1);refreshDeck(added);saveNow();
 overview.classList.remove('show');if(!editMode)toggleEdit();
}
buildOverview=function(){
 overview.innerHTML='<div class="overview-head"><strong>页面总览 · 可拖动排序</strong><button class="primary" data-overview="add">＋ 新页面</button><button data-overview="duplicate">复制当前页</button><button data-overview="close">关闭</button></div>';
 slides.forEach((s,i)=>{
  const m=slideMeta(s,i),t=document.createElement('div');t.className='thumb';t.draggable=true;t.dataset.i=i;
  t.innerHTML='<div class="tn">P'+String(i+1).padStart(2,'0')+' · '+esc(m.tag)+'</div><div class="tt">'+esc(m.en)+'</div><div class="tc">'+esc(m.cn)+'</div><div class="thumb-actions"><button data-act="up">↑</button><button data-act="down">↓</button><button data-act="copy">复制</button><button class="danger" data-act="delete">删除</button></div>';
  t.onclick=e=>{if(e.target.closest('button'))return;overview.classList.remove('show');show(i)};
  t.ondragstart=()=>{overviewDrag=i};
  t.ondragover=e=>{e.preventDefault();t.classList.add('drag-over')};
  t.ondragleave=()=>t.classList.remove('drag-over');
  t.ondrop=e=>{e.preventDefault();t.classList.remove('drag-over');moveSlide(overviewDrag,i)};
  t.querySelector('[data-act="up"]').onclick=e=>{e.stopPropagation();moveSlide(i,Math.max(0,i-1))};
  t.querySelector('[data-act="down"]').onclick=e=>{e.stopPropagation();moveSlide(i,Math.min(slides.length-1,i+1))};
  t.querySelector('[data-act="copy"]').onclick=e=>{e.stopPropagation();duplicateSlide(i)};
  t.querySelector('[data-act="delete"]').onclick=e=>{e.stopPropagation();deleteSlide(i)};
  overview.appendChild(t);
 });
 overview.querySelector('[data-overview="add"]').onclick=addBlankSlide;
 overview.querySelector('[data-overview="duplicate"]').onclick=()=>duplicateSlide(idx);
 overview.querySelector('[data-overview="close"]').onclick=()=>overview.classList.remove('show');
};
toggleOverview=function(){if(overview.classList.contains('show'))overview.classList.remove('show');else{buildOverview();overview.classList.add('show')}};

document.getElementById('insertBtn').onclick=()=>{
 if(!editMode)toggleEdit();uploadMode='new';uploadTarget=slides[idx];fileInput.value='';fileInput.click();
};
document.getElementById('overviewBtn').onclick=toggleOverview;
document.getElementById('saveBtn').onclick=saveNow;
document.getElementById('exportBtn').onclick=exportHTML;
document.getElementById('resetBtn').onclick=()=>{
 if(confirm('恢复课件初始内容？新增页面、排序和图片都会被清除。')){
  localStorage.removeItem(storageKey);originalDeckBuild();slides=slideNodes();idx=0;refreshDeck(slides[0]);overview.classList.remove('show');saveState.textContent='已恢复初稿';
 }
};
fileInput.onchange=()=>readFile(fileInput.files[0]);

let bootState=null;
try{const e=JSON.parse(document.getElementById('embedded-data').textContent||'{}');if(e&&e.deckData)bootState=e.deckData}catch(e){}
if(!bootState)try{const l=JSON.parse(localStorage.getItem(storageKey)||'null');if(l&&l.version===2)bootState=l}catch(e){}
if(bootState)restoreDeck(bootState);else refreshDeck(slides[idx]);
document.documentElement.dataset.editor='v2';
saveState.textContent=bootState?'已恢复可编辑课件':'编辑器已就绪';
saveState.classList.remove('show');
let saveToastTimer=0;
new MutationObserver(()=>{clearTimeout(saveToastTimer);saveState.classList.add('show');saveToastTimer=setTimeout(()=>saveState.classList.remove('show'),2200)}).observe(saveState,{childList:true,subtree:true,characterData:true});
})();
</script>
</body></html>
