<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人作业打样 · 5页设计规范文档示范</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
@font-face{ font-family:"Zpix"; src:url("zpix.woff2") format("woff2"); font-display:swap; }

:root{
  --bg:#0e0e23; --bg2:#15163a; --panel:#1c1d44; --panel2:#24255a;
  --ink:#f4f4ff; --dim:#a9abe0; --line:#3a3c7a; --black:#07071a;
  --red:#e03a3a; --orange:#ff9f1c; --blue:#3a86ff; --green:#43d35a;
  --magenta:#ff5db1; --cyan:#21d4d4; --gold:#ffd23f; --purple:#b15dff;
  --accent: var(--purple);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:#000;color:var(--ink);
  font-family:"Zpix","Press Start 2P","PingFang SC","Microsoft YaHei",monospace;
  overflow:hidden;display:flex;align-items:center;justify-content:center;image-rendering:pixelated;
}
.en{font-family:"Press Start 2P","Zpix",monospace}

#viewport{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
#stage{
  width:1280px;height:720px;position:relative;
  background:radial-gradient(circle at 50% 0%, #1b1c4a 0%, var(--bg) 70%);
  transform-origin:center center;overflow:hidden;border:6px solid #2c2e6e;
}
#stage::before{
  content:"";position:absolute;inset:0;pointer-events:none;
  background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
  background-size:16px 16px;z-index:0;
}

.page{position:absolute;inset:0;display:none;flex-direction:column;padding:40px 52px 32px;z-index:1}
.page.active{display:flex;animation:pop .18s steps(3)}
@keyframes pop{from{opacity:.2;transform:translateY(6px)}to{opacity:1;transform:none}}

.hud{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.tag{
  font-family:"Press Start 2P","Zpix",monospace;font-size:11px;letter-spacing:1px;
  background:var(--accent);color:var(--black);padding:9px 12px;border:3px solid #fff;
  box-shadow:5px 5px 0 var(--black);text-transform:uppercase;
}
.counter{
  font-family:"Press Start 2P","Zpix",monospace;font-size:11px;color:var(--ink);
  background:var(--panel);border:3px solid var(--line);padding:8px 11px;box-shadow:4px 4px 0 var(--black);
}
.counter b{color:var(--gold)}

.title .t-en{font-family:"Press Start 2P","Zpix",monospace;font-size:24px;line-height:1.35;color:#fff;
  text-shadow:4px 4px 0 var(--accent), 8px 8px 0 var(--black);}
.title .t-cn{font-size:18px;color:var(--dim);margin-top:12px;letter-spacing:1px;font-weight:bold}
.rule{height:6px;background:var(--accent);margin:16px 0 4px;border:3px solid var(--black);box-shadow:4px 4px 0 var(--black);width:110px}

.body{flex:1;display:flex;flex-direction:column;justify-content:center;gap:12px;min-height:0}
.panel{background:var(--panel);border:4px solid #fff;padding:18px 22px;box-shadow:8px 8px 0 var(--black)}
.panel.accentbox{border-color:var(--accent)}
.lead{font-size:19px;line-height:1.55}
.small{font-size:15.5px}

ul.bul{list-style:none;display:flex;flex-direction:column;gap:9px}
ul.bul li{display:flex;gap:11px;align-items:flex-start;font-size:17.5px;line-height:1.5}
ul.bul li::before{content:"";flex:0 0 auto;margin-top:7px;width:11px;height:11px;background:var(--accent);box-shadow:3px 3px 0 var(--black)}

ol.numlist{list-style:none;display:flex;flex-direction:column;gap:10px}
ol.numlist li{display:flex;gap:11px;align-items:flex-start;font-size:17.5px;line-height:1.5}
ol.numlist li .num{font-family:"Press Start 2P","Zpix",monospace;font-size:10.5px;color:var(--black);background:var(--gold);
  border:3px solid #fff;padding:6px 8px;box-shadow:3px 3px 0 var(--black);flex:0 0 auto}

.imgframe{
  position:relative;flex:1;min-height:140px;background:var(--bg2);
  border:4px dashed var(--accent);display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;overflow:hidden;text-align:center;padding:12px;
}
.imgframe .cam{font-size:28px}
.imgframe .ph{font-family:"Press Start 2P","Zpix",monospace;font-size:9.5px;color:var(--accent);line-height:1.7}
.imgframe img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.imgframe input{position:absolute;inset:0;opacity:0;cursor:pointer}
.corner{position:absolute;width:14px;height:14px;border:4px solid var(--gold);z-index:2}
.corner.tl{top:6px;left:6px;border-right:none;border-bottom:none}
.corner.tr{top:6px;right:6px;border-left:none;border-bottom:none}
.corner.bl{bottom:6px;left:6px;border-right:none;border-top:none}
.corner.br{bottom:6px;right:6px;border-left:none;border-top:none}
.anno{font-size:13.5px;color:var(--dim);line-height:1.5}
.anno b{color:var(--ink)}

/* ---- two-mode swatch row (day / night) ---- */
.modepair{display:flex;gap:20px}
.modeblock{flex:1;display:flex;flex-direction:column;gap:8px}
.modeblock h4{font-family:"Press Start 2P","Zpix",monospace;font-size:10.5px;padding:7px 9px;border:3px solid #fff;
  box-shadow:3px 3px 0 var(--black);text-align:center}
.modeblock.day h4{background:var(--gold);color:var(--black)}
.modeblock.night h4{background:#2a2d55;color:var(--cyan)}
.tokrow{display:flex;align-items:center;gap:10px;background:var(--panel2);border:2px solid var(--line);padding:6px 8px}
.tokrow .sw{width:22px;height:22px;border:2px solid #fff;box-shadow:2px 2px 0 var(--black);flex:0 0 auto}
.tokrow .name{font-size:12.5px;flex:1}
.tokrow .hex{font-family:"Press Start 2P","Zpix",monospace;font-size:8.5px;color:var(--dim)}

/* ---- type / spacing scale strips ---- */
.scalerow{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
.scaleitem{display:flex;flex-direction:column;align-items:center;gap:6px}
.scaleitem .box{background:var(--gold);border:2px solid #fff;box-shadow:2px 2px 0 var(--black)}
.scaleitem .lbl{font-size:11px;color:var(--dim)}

/* ---- small pixel icon (star), used in the component-overview grid ---- */
.pix-star{position:relative;width:18px;height:18px;display:inline-block}
.pix-star::before{content:"";position:absolute;left:8px;top:0;width:2px;height:2px;background:var(--gold);
  box-shadow:
    0 2px var(--gold),2px 2px var(--gold),4px 2px var(--gold),6px 2px var(--gold),8px 2px var(--gold),
    2px 4px var(--gold),4px 4px #fff7c0,6px 4px var(--gold),
    0 6px var(--gold),2px 6px var(--gold),4px 6px var(--gold),6px 6px var(--gold),8px 6px var(--gold),
    4px 8px var(--gold);
}

/* ---- component grid (atoms->organisms overview) ---- */
.compgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.compcell{background:var(--panel2);border:2px solid var(--line);padding:8px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:6px;min-height:70px;text-align:center}
.compcell .lbl{font-size:11px;color:var(--dim)}

/* ---- dialogue state chips ---- */
.states-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.state-item{display:flex;flex-direction:column;align-items:center;gap:6px}
.chip{font-family:"Zpix","Press Start 2P",monospace;font-size:11px;padding:10px 12px;border:3px solid #fff;
  position:relative;min-width:96px;text-align:center}
.chip::after{content:"";position:absolute;left:14px;bottom:-9px;width:0;height:0;
  border-left:7px solid transparent;border-right:7px solid transparent;border-top:9px solid;}
.chip.ask{background:var(--blue);color:#fff;box-shadow:3px 3px 0 var(--black)}
.chip.ask::after{border-top-color:var(--blue)}
.chip.wait{background:#3a3c55;color:var(--dim);box-shadow:3px 3px 0 var(--black)}
.chip.wait::after{border-top-color:#3a3c55}
.chip.picked{background:var(--gold);color:var(--black);box-shadow:0 0 0 3px var(--cyan),3px 3px 0 var(--black)}
.chip.picked::after{border-top-color:var(--gold)}
.chip.result{background:var(--green);color:var(--black);box-shadow:3px 3px 0 var(--black)}
.chip.result::after{border-top-color:var(--green)}
.chip.memory{background:var(--magenta);color:#fff;box-shadow:3px 3px 0 var(--black)}
.chip.memory::after{border-top-color:var(--magenta)}

.goldsentence{font-size:20px;line-height:1.7;text-align:center;padding:20px}
.goldsentence b{color:var(--gold)}

.gradetable{width:100%;border-collapse:collapse;font-size:14px}
.gradetable th,.gradetable td{border:2px solid var(--line);padding:7px 9px;text-align:left}
.gradetable th{background:var(--panel2);font-family:"Press Start 2P","Zpix",monospace;font-size:9.5px;color:var(--gold)}
.gradetable td.pts{font-family:"Press Start 2P","Zpix",monospace;font-size:11px;color:var(--gold);text-align:center;width:56px}

.disclaimer{font-size:13px;color:var(--dim);margin-top:auto;padding-top:8px;border-top:3px solid var(--line)}
.disclaimer b{color:var(--orange)}

.foot{display:flex;align-items:center;justify-content:space-between;margin-top:12px;border-top:4px solid var(--line);padding-top:9px}
.foot .brand{font-family:"Press Start 2P","Zpix",monospace;font-size:9px;color:var(--line)}
.help{font-family:"Press Start 2P","Zpix",monospace;font-size:9px;color:var(--dim)}
.help b{color:var(--gold)}

#progress{position:absolute;left:0;right:0;bottom:0;height:8px;display:flex;z-index:3}
#progress i{flex:1;background:#1a1b40;border-right:1px solid #000}
#progress i.on{background:var(--accent)}

#toolbar{position:fixed;left:10px;bottom:10px;z-index:45;display:flex;gap:6px}
#toolbar button{font-family:"Press Start 2P","Zpix",monospace;font-size:9px;color:#fff;background:var(--panel);
  border:3px solid var(--line);padding:8px 9px;cursor:pointer;box-shadow:3px 3px 0 #000}
#toolbar button:hover{border-color:var(--gold)}
#toolbar button.on{background:var(--green);color:#07071a;border-color:#fff}
#hint{position:fixed;right:10px;bottom:14px;z-index:40;font-family:"Press Start 2P","Zpix",monospace;font-size:8px;color:#5658a0}

.cover{align-items:center;justify-content:center;text-align:center;gap:0}
.cover .badge-top{font-family:"Press Start 2P","Zpix",monospace;font-size:11px;color:var(--gold);margin-bottom:24px;letter-spacing:2px}
.cover h1{font-family:"Press Start 2P","Zpix",monospace;font-size:34px;line-height:1.4;color:#fff;
  text-shadow:5px 5px 0 var(--red),10px 10px 0 var(--black)}
.cover .sub{font-size:20px;color:var(--cyan);margin-top:22px;letter-spacing:2px;font-weight:bold}
.cover .warn{font-family:"Press Start 2P","Zpix",monospace;font-size:10.5px;color:var(--orange);margin-top:30px;line-height:2;
  border:3px solid var(--orange);padding:14px 18px;background:rgba(255,159,28,.08)}
</style>
</head>
<body>
<div id="viewport">
  <div id="stage">
    <div id="progress"></div>
  </div>
</div>
<div id="hint">← → 翻页 · F 全屏</div>

<script>
const stage = document.getElementById("stage");
const progress = document.getElementById("progress");

/* ===== simple retro chiptune (same approach as the main lecture deck) ===== */
const Sound = (function(){
  let ctx, master, bgmGain, sfxGain, bgmOn=true, schedTimer, nextT=0, step=0;
  const BASS=[110,0,0,0, 87.31,0,0,0, 130.81,0,0,0, 98,0,0,0];
  const LEAD=[440,0,523,0, 392,0,440,0, 523,0,659,0, 494,0,440,0];
  const STEP=0.16;
  function ready(){
    if(ctx) return true;
    try{
      ctx=new (window.AudioContext||window.webkitAudioContext)();
      master=ctx.createGain(); master.gain.value=0.9; master.connect(ctx.destination);
      bgmGain=ctx.createGain(); bgmGain.gain.value=0.045; bgmGain.connect(master);
      sfxGain=ctx.createGain(); sfxGain.gain.value=0.2; sfxGain.connect(master);
      return true;
    }catch(e){ return false; }
  }
  function tone(freq,dur,type,gain,at,target){
    const t=at||ctx.currentTime, o=ctx.createOscillator(), g=ctx.createGain();
    o.type=type||"square"; o.frequency.setValueAtTime(freq,t);
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(gain||0.3,t+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g); g.connect(target||sfxGain);
    o.start(t); o.stop(t+dur+0.02);
  }
  function scheduler(){
    while(nextT < ctx.currentTime+0.12){
      const i=step%16;
      if(LEAD[i]) tone(LEAD[i],STEP*1.1,"square",0.22,nextT,bgmGain);
      if(BASS[i]) tone(BASS[i],STEP*3.2,"triangle",0.35,nextT,bgmGain);
      nextT+=STEP; step++;
    }
  }
  function startBGM(){ if(!ready())return; if(ctx.state==="suspended")ctx.resume(); if(schedTimer)return; nextT=ctx.currentTime+0.05; schedTimer=setInterval(scheduler,25); }
  function stopBGM(){ if(schedTimer){clearInterval(schedTimer);schedTimer=null;} }
  return {
    nav(){ if(!ready())return; if(ctx.state==="suspended")ctx.resume(); tone(880,0.05,"square",0.28); },
    click(){ if(!ready())return; if(ctx.state==="suspended")ctx.resume(); tone(523,0.04,"square",0.22); },
    toggle(){ bgmOn=!bgmOn; if(bgmOn)startBGM(); else stopBGM(); return bgmOn; },
    kick(){ if(bgmOn) startBGM(); }
  };
})();

/* ===== image placeholder frames ===== */
function frame(hint){
  return `<div class="imgframe">
    <span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span>
    <div class="cam">🖼️</div><div class="ph">${hint}</div>
    <input type="file" accept="image/*" onchange="loadImg(this)">
  </div>`;
}
function loadImg(input){
  const file=input.files[0]; if(!file) return;
  const fr=new FileReader();
  fr.onload=()=>{
    const frameEl=input.parentElement;
    let img=frameEl.querySelector("img");
    if(!img){ img=document.createElement("img"); frameEl.appendChild(img); }
    img.src=fr.result;
    frameEl.querySelectorAll(".cam,.ph").forEach(e=>e.style.display="none");
  };
  fr.readAsDataURL(file);
}

/* ===== token row / scale helpers ===== */
function tok(name,hex){ return `<div class="tokrow"><span class="sw" style="background:${hex}"></span><span class="name">${name}</span><span class="hex">${hex}</span></div>`; }
function scaleBox(size,label){ return `<div class="scaleitem"><div class="box" style="width:${size}px;height:${size}px"></div><div class="lbl">${label}</div></div>`; }

{tag:"HOW TO READ", acc:"var(--cyan)", title:["How To Read This Demo","怎么看这份打样"], html:`
  <div class="body">

      <ul class="bul">

  </div>
`},

// P6 状态说明（对话框 5 状态）
{tag:"PAGE 4 OF 5", acc:"var(--gold)", title:["State Documentation","状态说明：对话框组件"], html:`
  <div class="body">
    <div class="panel accentbox" style="flex:1;display:flex;align-items:center;justify-content:center">

/* ===== render ===== */
PAGES.forEach((p,i)=>{
  const el=document.createElement("section");
  el.className="page"+(p.cover?" cover":"");
  el.style.setProperty("--accent", p.acc);
  if(p.cover){
    el.innerHTML = p.html;
  }else{
    el.innerHTML = `
      <div class="hud">
        <div class="tag">${p.tag}</div>
        <div class="counter">P <b>${String(i+1).padStart(2,"0")}</b> / ${PAGES.length}</div>
      </div>
      <div class="title">
        <div class="t-en en">${p.title[0]}</div>
        <div class="t-cn">${p.title[1]}</div>
      </div>
      <div class="rule"></div>
      ${p.html}
      <div class="foot">
        <div class="brand">SAMPLE · SLIME MBTI SPEC DOC</div>
        <div class="help">← → <b>MOVE</b> · F <b>FULLSCREEN</b></div>
      </div>`;
  }
  stage.insertBefore(el, progress);
  const blk=document.createElement("i");
  progress.appendChild(blk);
});
const slides=[...stage.querySelectorAll(".page")];
const blocks=[...progress.children];

let idx=0;
function show(i){
  idx=Math.max(0,Math.min(slides.length-1,i));
  slides.forEach((s,k)=>s.classList.toggle("active",k===idx));
  blocks.forEach((b,k)=>{
    b.classList.toggle("on",k<=idx);
    b.style.background = k<=idx ? PAGES[idx].acc : "#1a1b40";
  });
}
function next(){ Sound.nav(); show(idx+1); }
function prev(){ Sound.nav(); show(idx-1); }

document.addEventListener("keydown",e=>{
  switch(e.key){
    case "ArrowRight": case " ": case "PageDown": next(); e.preventDefault(); break;
    case "ArrowLeft": case "PageUp": prev(); e.preventDefault(); break;
    case "Home": show(0); break;
    case "End": show(slides.length-1); break;
    case "f": case "F":
      if(!document.fullscreenElement) document.documentElement.requestFullscreen();
      else document.exitFullscreen();
      break;
  }
});
stage.addEventListener("click",e=>{
  if(e.target.closest(".imgframe")) return;
  const r=stage.getBoundingClientRect(), x=e.clientX-r.left;
  if(x<r.width*0.3) prev(); else if(x>r.width*0.7) next();
});

const bar=document.createElement("div");
bar.id="toolbar";
bar.innerHTML=`<button id="btnMusic" class="on">♪ 音乐</button>`;
document.body.appendChild(bar);
const bm=document.getElementById("btnMusic");
bm.onclick=()=>{ Sound.click(); const on=Sound.toggle(); bm.classList.toggle("on",on); bm.textContent=on?"♪ 音乐":"♪ 静音"; };
["pointerdown","keydown"].forEach(ev=>document.addEventListener(ev,()=>Sound.kick()));

function fit(){
  const s=Math.min(window.innerWidth/1280, window.innerHeight/720);
  stage.style.transform=`scale(${s})`;
}
window.addEventListener("resize",fit);
fit(); show(0);
</script>
</body>
</html>
